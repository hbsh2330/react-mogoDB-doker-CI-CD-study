name: Deploy Node.js
on:
  push:
    paths: ['backendNode/**'] # 노드 폴더 수정 시에만 실행
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. 백엔드 빌드 (폴더 이름이 backend인지 꼭 확인!)
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backendNode
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-fruit-node-backend:latest